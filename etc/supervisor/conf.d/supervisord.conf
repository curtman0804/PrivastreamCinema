# Production supervisor config
# Backend API server
[program:backend]
command=/root/.venv/bin/uvicorn server:app --host 0.0.0.0 --port 8001 --workers 1
directory=/app/backend
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/backend.err.log
stdout_logfile=/var/log/supervisor/backend.out.log
stopsignal=TERM
stopwaitsecs=30
stopasgroup=true
killasgroup=true

# Torrent streaming server
[program:torrent-server]
directory=/app/torrent-server
command=node server.js
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/torrent-server.err.log
stdout_logfile=/var/log/supervisor/torrent-server.out.log
environment=NODE_ENV="production",PORT="8002"
